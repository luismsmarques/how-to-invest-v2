---
# cPanel Git™ Version Control deployment (production = main).
#
# Kept deliberately simple — cPanel's YAML/task parser is strict and dislikes
# complex shell. Tasks run from the repository root; sources below are relative.
# Only our theme + plugins are deployed; WordPress core, wp-config.php and
# uploads are never touched.
#
# DEPLOYPATH is this site's wp-content. For a STAGING environment (develop
# branch), change this one path to the staging docroot's wp-content.
deployment:
  tasks:
    - export DEPLOYPATH=/home/howtoinvest/howtoinvest.pro/wp-content
    - /bin/mkdir -p $DEPLOYPATH/plugins $DEPLOYPATH/themes
    - /bin/rm -rf $DEPLOYPATH/plugins/hti-engine
    - /bin/cp -R wp-content/plugins/hti-engine $DEPLOYPATH/plugins/
    - /bin/rm -rf $DEPLOYPATH/plugins/hti-rss-ai
    - /bin/cp -R wp-content/plugins/hti-rss-ai $DEPLOYPATH/plugins/
    - /bin/rm -rf $DEPLOYPATH/plugins/hti-social
    - /bin/cp -R wp-content/plugins/hti-social $DEPLOYPATH/plugins/
    - /bin/rm -rf $DEPLOYPATH/themes/howtoinvest
    - /bin/cp -R wp-content/themes/howtoinvest $DEPLOYPATH/themes/
    - cd $DEPLOYPATH/plugins/hti-engine && ( command -v composer >/dev/null 2>&1 && timeout 180 composer install --no-dev --no-interaction --no-progress --optimize-autoloader ) || true
